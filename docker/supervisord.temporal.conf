# Supervisord for the Temporal scheduler path (WS-B).
# Runs the API + a dedicated Temporal worker. The Celery worker/beat are NOT
# started here — the temporal-worker owns execution. Use with
# OH_SCHEDULER_BACKEND=temporal (set on the container) alongside a temporal-server.

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root

[program:api]
command=/root/.openharness-venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
directory=/opt/oh-service
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/api-stdout.log
stderr_logfile=/var/log/supervisor/api-stderr.log
environment=PYTHONPATH="/app/src:/opt/oh-service"

[program:temporal-worker]
command=/root/.openharness-venv/bin/python -m app.workers.temporal_worker
directory=/opt/oh-service
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/temporal-worker-stdout.log
stderr_logfile=/var/log/supervisor/temporal-worker-stderr.log
environment=PYTHONPATH="/app/src:/opt/oh-service"

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface
